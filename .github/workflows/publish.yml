name: Publish to PyPI

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tool
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build sdist and wheel
        run: python -m build

      - name: Upload distribution artifact
        uses: actions/upload-artifact@v4
        with:
          name: dbnt-dist
          path: dist/

  publish:
    name: Publish to PyPI (trusted publishing)
    needs: build
    runs-on: ubuntu-latest
    # This must match the "Environment name" configured on the PyPI trusted
    # publisher for this project. See the ONE-TIME setup note in README.md /
    # CONTRIBUTING.md before the first tagged release.
    environment: pypi
    permissions:
      id-token: write # required for OIDC trusted publishing — no API token needed
    steps:
      - name: Download distribution artifact
        uses: actions/download-artifact@v4
        with:
          name: dbnt-dist
          path: dist/

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
