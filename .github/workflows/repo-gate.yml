name: Repo Gate

on:
  pull_request:
  push:
    branches: [main]

jobs:
  repo-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: corepack enable || true
      - run: bash gate.sh
